<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- NAS 본체가 아이콘 전체를 가득 채운다 (full-bleed) -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="#1c2230"/>
  <rect x="2" y="2" width="508" height="508" rx="114" fill="none" stroke="#323a4e" stroke-width="4"/>

  <!-- 좌측 컨트롤 패널 -->
  <rect x="56" y="84" width="78" height="344" rx="20" fill="#141a26"/>

  <!-- 상태 LED -->
  <circle cx="95" cy="124" r="7" fill="#2dd4bf"/>
  <circle cx="95" cy="156" r="7" fill="#2dd4bf"/>
  <circle cx="95" cy="188" r="7" fill="#2dd4bf"/>
  <circle cx="95" cy="220" r="7" fill="#3f4a60"/>

  <!-- 전원 버튼 -->
  <circle cx="95" cy="392" r="22" fill="none" stroke="#2dd4bf" stroke-width="4"/>
  <path d="M95 376 v16" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>

  <!-- 4베이 드라이브 -->
  <g fill="#2b3242">
    <rect x="150" y="84" width="66" height="344" rx="12"/>
    <rect x="230" y="84" width="66" height="344" rx="12"/>
    <rect x="310" y="84" width="66" height="344" rx="12"/>
    <rect x="390" y="84" width="66" height="344" rx="12"/>
  </g>

  <!-- 손잡이 홈 -->
  <g fill="#3a4256">
    <rect x="163" y="116" width="40" height="12" rx="6"/>
    <rect x="243" y="116" width="40" height="12" rx="6"/>
    <rect x="323" y="116" width="40" height="12" rx="6"/>
    <rect x="403" y="116" width="40" height="12" rx="6"/>
  </g>

  <!-- 드라이브 LED -->
  <g fill="#2dd4bf">
    <circle cx="183" cy="398" r="6.5"/>
    <circle cx="263" cy="398" r="6.5"/>
    <circle cx="343" cy="398" r="6.5"/>
    <circle cx="423" cy="398" r="6.5"/>
  </g>
</svg>
